# Drop into /etc/nginx/sites-available/sablos and symlink into sites-enabled.
# Replace example.com with your real domain. After certbot runs it will
# rewrite this file to add the TLS server block.

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    client_max_body_size 5m;

    location = /favicon.ico { access_log off; log_not_found off; }

    location /static/ {
        alias /home/deploy/sablos_root/staticfiles/;
        access_log off;
        expires 30d;
    }

    location /media/ {
        alias /home/sablos_media/;
        access_log off;
        expires 30d;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass http://unix:/run/sablos/sablos.sock;
    }
}
