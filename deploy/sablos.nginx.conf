# Reference config for sablos.devs.tt.
#
# If you already have a sites-available file for sablos.devs.tt (e.g. from
# certbot), don't replace it — copy the location blocks below into your
# existing server block(s). Certbot will already have set up the listen
# directives, server_name, ssl_certificate, and the HTTP→HTTPS redirect.
#
# Static files are served by WhiteNoise inside the gunicorn process, so
# nginx only needs to proxy. /media/ is still served directly by nginx
# because WhiteNoise does not serve user uploads.

server {
    listen 80;
    listen [::]:80;
    server_name sablos.devs.tt;

    client_max_body_size 5m;

    location = /favicon.ico { access_log off; log_not_found off; }

    location /media/ {
        alias /var/www/sablos_media/;
        access_log off;
        expires 30d;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass http://unix:/run/sablos/sablos.sock;
    }
}
