{% extends "layouts/dashboard.html" %}

{% block title %}Delete comment — WIP{% endblock %}

{% block dashboard_content %}
  <h1 class="h3 mb-3">Delete comment</h1>
  <p>Are you sure you want to delete this comment?</p>
  <blockquote class="border-start border-3 ps-3 text-body-secondary">
    {{ object.body|linebreaksbr }}
  </blockquote>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{{ object.objective.get_absolute_url }}" class="btn btn-link">Cancel</a>
  </form>
{% endblock %}
