{% extends "layouts/dashboard.html" %}

{% block title %}Delete objective — WIP{% endblock %}

{% block dashboard_content %}
  <h1 class="h3 mb-3">Delete objective</h1>
  <p>Are you sure you want to delete <strong>{{ object.short_description }}</strong>?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{{ object.get_absolute_url }}" class="btn btn-link">Cancel</a>
  </form>
{% endblock %}
