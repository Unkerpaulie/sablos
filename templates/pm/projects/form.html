{% extends "layouts/dashboard.html" %}

{% block title %}{% if object %}Edit{% else %}New{% endif %} project — WIP{% endblock %}

{% block dashboard_content %}
  <h1 class="h3 mb-4">{% if object %}Edit{% else %}New{% endif %} project</h1>
  <form method="post" novalidate class="col-lg-9">
    {% csrf_token %}
    {% include "components/form_fields.html" %}
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'pm:project_list' %}" class="btn btn-link">Cancel</a>
  </form>
{% endblock %}
