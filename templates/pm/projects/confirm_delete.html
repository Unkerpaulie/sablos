{% extends "layouts/dashboard.html" %}

{% block title %}Delete project — WIP{% endblock %}

{% block dashboard_content %}
  <h1 class="h3 mb-3">Delete project</h1>
  <p>Are you sure you want to delete <strong>{{ object.name }}</strong>?
     All objectives and comments belonging to it will be deleted as well.</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{{ object.get_absolute_url }}" class="btn btn-link">Cancel</a>
  </form>
{% endblock %}
