{% load pm_extras %}
<div class="position-sticky pt-3 px-3">
  <div class="d-flex justify-content-between align-items-center mb-1">
    <h6 class="text-uppercase text-body-secondary small mb-0">Dashboard</h6>
  </div>
  <ul class="nav flex-column mb-3">
    <li class="nav-item">
      <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
         href="{% url 'pm:dashboard' %}">Current objectives</a>
    </li>
  </ul>

  <div class="d-flex justify-content-between align-items-center mb-1 mt-3">
    <h6 class="text-uppercase text-body-secondary small mb-0">Clients</h6>
    <a href="{% url 'pm:client_create' %}" class="btn btn-sm btn-outline-primary py-0">+</a>
  </div>
  <ul class="nav flex-column mb-3">
    <li class="nav-item">
      <a class="nav-link {% if request.resolver_match.url_name == 'client_list' %}active{% endif %}"
         href="{% url 'pm:client_list' %}">All clients</a>
    </li>
  </ul>

  <div class="d-flex justify-content-between align-items-center mb-1 mt-3">
    <h6 class="text-uppercase text-body-secondary small mb-0">Projects</h6>
    <a href="{% url 'pm:project_create' %}" class="btn btn-sm btn-outline-primary py-0">+</a>
  </div>
  <ul class="nav flex-column mb-3">
    <li class="nav-item">
      <a class="nav-link {% if request.resolver_match.url_name == 'project_list' %}active{% endif %}"
         href="{% url 'pm:project_list' %}">All projects</a>
    </li>
  </ul>

  <div class="d-flex justify-content-between align-items-center mb-1 mt-3">
    <h6 class="text-uppercase text-body-secondary small mb-0">Comments</h6>
  </div>
  <ul class="nav flex-column mb-3">
    <li class="nav-item">
      <a class="nav-link {% if request.resolver_match.url_name == 'comment_list' %}active{% endif %}"
         href="{% url 'pm:comment_list' %}">All comments</a>
    </li>
  </ul>

  <div class="d-flex justify-content-between align-items-center mb-1 mt-3">
    <h6 class="text-uppercase text-body-secondary small mb-0">Messages</h6>
  </div>
  <ul class="nav flex-column mb-3">
    <li class="nav-item">
      <a class="nav-link {% if request.resolver_match.url_name == 'message_list' %}active{% endif %}"
         href="{% url 'pm:message_list' %}">Inbox</a>
    </li>
  </ul>
</div>
