{% with url_name=request.resolver_match.url_name|default:'' %}
<div class="position-sticky pt-3">
  <ul class="nav flex-column">
    <li class="nav-item">
      <a class="nav-link {% if url_name == 'dashboard' %}active{% endif %}"
         href="{% url 'pm:dashboard' %}">Dashboard</a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if url_name|slice:':7' == 'client_' %}active{% endif %}"
         href="{% url 'pm:client_list' %}">Clients</a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if url_name|slice:':8' == 'project_' or url_name|slice:':10' == 'objective_' %}active{% endif %}"
         href="{% url 'pm:project_list' %}">Projects</a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if url_name|slice:':8' == 'comment_' %}active{% endif %}"
         href="{% url 'pm:comment_list' %}">Comments</a>
    </li>
    <li class="nav-item">
      <a class="nav-link d-flex justify-content-between align-items-center {% if url_name|slice:':8' == 'message_' %}active{% endif %}"
         href="{% url 'pm:message_list' %}">
        <span>Messages</span>
        {% if unread_messages_count %}
          <span class="badge bg-primary rounded-pill">{{ unread_messages_count }}</span>
        {% endif %}
      </a>
    </li>
  </ul>
</div>
{% endwith %}
